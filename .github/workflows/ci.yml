name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Compile check
        run: python -m py_compile x_news_alert/cli.py x_news_alert/config_loader.py x_news_alert/models.py x_news_alert/output.py x_news_alert/tweets.py scripts/x_news_alert.py tests/test_core.py

      - name: Test
        run: python -m pytest -q

      - name: Build package
        run: python -m build
